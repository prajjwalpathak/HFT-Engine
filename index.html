<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        HFT Exchange Engine Dashboard
    </title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="styles.css"
    >

</head>

<body>

    <div class="container">

        <header>

            <div>

                <h1>
                    HFT Exchange Engine
                </h1>

                <p class="subtitle">
                    Low-Latency Exchange Engine
                </p>

            </div>

            <div id="status">
                ● LIVE
            </div>

        </header>

        <section class="metrics">

            <div class="metric-card">

                <h2>
                    Mode
                </h2>

                <p
                    id="currentMode"
                    class="blue"
                >
                    NORMAL
                </p>

            </div>

            <div class="metric-card">

                <h2>
                    Orders/sec
                </h2>

                <p id="ordersPerSec">
                    0
                </p>

            </div>

            <div class="metric-card">

                <h2>
                    Total Orders
                </h2>

                <p id="totalOrders">
                    0
                </p>

            </div>

            <div class="metric-card">

                <h2>
                    Time Elapsed
                </h2>

                <p id="elapsedTime">
                    0s
                </p>

            </div>

        </section>

        <section class="orderbook">

            <div class="book-side">

                <h2>
                    ASKS
                </h2>

                <div id="asks"></div>

            </div>

            <div class="book-side">

                <h2>
                    BIDS
                </h2>

                <div id="bids"></div>

            </div>

        </section>

        <section class="trade-tape">

            <h2>
                Live Trades
            </h2>

            <div id="trades"></div>

        </section>

        <section class="controls">

            <h2>
                Simulation Controls
            </h2>

            <div class="control-buttons">

                <button id="toggleBtn">
                    ▶ Start
                </button>

                <button id="normalBtn">
                    🌱 Normal Mode
                </button>

                <button id="hftBtn">
                    ⚡ HFT Mode
                </button>

                <button id="stressBtn">
                    🔥 Stress Test
                </button>

                <button id="resetBtn">
                    ⌛ Reset
                </button>

            </div>

        </section>

        <footer>

            HFT Exchange Engine

        </footer>

    </div>

    <script src="app.js"></script>

</body>

</html>
